<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guilherme Bertanha — Engenheiro Mecatrônico</title>
  <meta name="description" content="Engenheiro Mecatrônico — firmware embarcado, robótica humanoide e agentes de IA." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* =================================================================
       TOKENS
       ================================================================= */
    :root {
      --bg: #0a0a0a;
      --bg-elev: #111111;
      --bg-card: #141414;
      --line: #1f1f1f;
      --line-strong: #2a2a2a;
      --fg: #e8e6e1;
      --fg-dim: #8a8780;
      --fg-faint: #4a4844;
      --accent: #10b981;
      --accent-dim: #059669;
      --accent-bright: #34d399;
      --warn: #ffb84d;
      --ok: #6dd58c;
      --info: #6da6ff;
      --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
      --sans: 'Space Grotesk', system-ui, sans-serif;
    }

    /* =================================================================
       RESET
       ================================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body { overflow-x: hidden; }
    button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    html { scroll-behavior: smooth; }

    /* =================================================================
       TYPE UTILITIES
       ================================================================= */
    .mono { font-family: var(--mono); }
    .dim { color: var(--fg-dim); }
    .faint { color: var(--fg-faint); }
    .accent { color: var(--accent); }
    .upper { text-transform: uppercase; letter-spacing: 0.08em; }

    /* =================================================================
       APP LAYOUT
       ================================================================= */
    .app { max-width: 1440px; margin: 0 auto; padding: 0 32px; }
    @media (max-width: 720px) { .app { padding: 0 16px; } }

    /* =================================================================
       TOPBAR
       ================================================================= */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 32px;
      border-bottom: 1px solid var(--line);
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .topbar__left, .topbar__right { display: flex; align-items: center; gap: 16px; }
    .topbar__sig { display: flex; align-items: center; gap: 10px; color: var(--fg); }
    .topbar__dot {
      width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(16,185,129,0.18);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(16,185,129,0.18); }
      50%      { box-shadow: 0 0 0 6px rgba(16,185,129,0.05); }
    }
    .topbar__time { color: var(--fg-dim); font-family: var(--mono); font-size: 10px; }
    .topbar__nav { display: flex; gap: 18px; color: var(--fg-dim); }
    .topbar__nav a { transition: color 160ms ease; position: relative; }
    .topbar__nav a:hover { color: var(--fg); }
    .topbar__nav a.is-active { color: var(--accent); }
    @media (max-width: 720px) {
      .topbar { padding: 14px 16px; }
      .topbar__nav { display: none; }
    }

    /* =================================================================
       SECTION SCAFFOLD
       ================================================================= */
    section { padding: 80px 0; border-bottom: 1px solid var(--line); position: relative; scroll-margin-top: 72px; }
    .section__head {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 24px;
      margin-bottom: 36px;
      border-bottom: 1px dashed var(--line-strong);
      padding-bottom: 16px;
    }
    .section__title { font-size: 32px; font-weight: 600; letter-spacing: -0.02em; }
    .section__id {
      font-family: var(--mono); font-size: 11px; color: var(--fg-dim);
      letter-spacing: 0.14em; text-transform: uppercase;
    }

    /* =================================================================
       BUTTONS
       ================================================================= */
    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 12px 18px;
      border: 1px solid var(--line-strong); border-radius: 2px;
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--fg);
      transition: all 0.18s ease;
      background: transparent;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn--primary { background: var(--accent); border-color: var(--accent); color: #0a0a0a; }
    .btn--primary:hover { background: var(--accent-bright); border-color: var(--accent-bright); color: #0a0a0a; }
    .btn__arrow { font-family: var(--mono); font-size: 13px; transition: transform 0.18s ease; }
    .btn:hover .btn__arrow { transform: translateX(3px); }

    /* =================================================================
       HERO
       ================================================================= */
    .hero { padding: 56px 0 80px; border-bottom: 1px solid var(--line); }
    .hero__grid {
      display: grid; grid-template-columns: 1.1fr 1fr; gap: 48px; align-items: stretch;
    }
    @media (max-width: 920px) { .hero__grid { grid-template-columns: 1fr; } }
    .hero__left { display: flex; flex-direction: column; justify-content: space-between; gap: 32px; min-width: 0; }
    .hero__right { min-width: 0; display: flex; }
    .hero__right > * { flex: 1; min-width: 0; }
    .hero__greet {
      display: flex; align-items: center; gap: 12px;
      font-family: var(--mono); font-size: 11px; color: var(--fg-dim);
      text-transform: uppercase; letter-spacing: 0.14em;
    }
    .hero__greet-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
      animation: blink 1.5s steps(2) infinite;
    }
    .hero__name {
      font-size: clamp(48px, 7.2vw, 96px);
      line-height: 0.92; font-weight: 600; letter-spacing: -0.035em;
      text-wrap: balance;
    }
    .hero__name em { font-style: normal; color: var(--accent); }
    .hero__role { margin-top: 24px; font-size: 18px; color: var(--fg-dim); max-width: 480px; text-wrap: pretty; }
    .hero__role strong { color: var(--fg); font-weight: 500; }
    .hero__cta { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
    .hero__meta {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
      padding-top: 24px; border-top: 1px dashed var(--line-strong);
    }
    .hero__meta-cell { display: flex; flex-direction: column; gap: 6px; }
    .hero__meta-label { font-family: var(--mono); font-size: 9px; color: var(--fg-faint); text-transform: uppercase; letter-spacing: 0.16em; }
    .hero__meta-value { font-family: var(--mono); font-size: 12px; color: var(--fg); }

    /* =================================================================
       TELEMETRY PANEL
       ================================================================= */
    .telemetry {
      background: var(--bg-elev);
      border: 1px solid var(--line-strong);
      border-radius: 2px;
      padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
      min-height: 460px; min-width: 0;
      position: relative; overflow: hidden;
    }
    .telemetry::before {
      content: ''; position: absolute; inset: 0;
      background-image:
        linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
    }
    .telemetry__head {
      display: flex; align-items: center; justify-content: space-between;
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--fg-dim);
      padding-bottom: 10px; border-bottom: 1px solid var(--line);
      position: relative; z-index: 1;
    }
    .telemetry__head .live { display: flex; align-items: center; gap: 6px; color: var(--ok); }
    .telemetry__head .live::before {
      content: ''; width: 6px; height: 6px; background: var(--ok); border-radius: 50%;
      animation: blink 1s steps(2) infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .telemetry__viz {
      flex: 1; display: grid; grid-template-columns: 1.2fr 1fr; gap: 12px;
      position: relative; z-index: 1; min-height: 280px; min-width: 0;
    }
    .telemetry__diagram {
      background: #0d0d0d; border: 1px solid var(--line); position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center; padding: 12px;
    }
    .telemetry__readout {
      display: flex; flex-direction: column; gap: 6px;
      font-family: var(--mono); font-size: 10px;
      background: #0d0d0d; border: 1px solid var(--line); padding: 12px;
      overflow: hidden; min-width: 0;
    }
    .telemetry__readout-row {
      display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
      color: var(--fg-dim); border-bottom: 1px dotted var(--line); padding-bottom: 4px;
    }
    .telemetry__readout-row:last-child { border-bottom: none; }
    .telemetry__readout-row b { color: var(--fg); font-weight: 500; }
    .telemetry__readout-row.is-warn b { color: var(--warn); }
    .telemetry__readout-row.is-ok b { color: var(--ok); }
    .telemetry__feed {
      border-top: 1px solid var(--line);
      padding-top: 10px;
      position: relative; z-index: 1;
      font-family: var(--mono); font-size: 10px; color: var(--fg-dim);
      display: flex; gap: 16px; white-space: nowrap;
      overflow: hidden; min-width: 0; max-width: 100%;
    }
    .telemetry__feed-track {
      display: flex; gap: 24px; width: max-content;
      animation: scroll-feed 28s linear infinite;
    }
    @keyframes scroll-feed { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .telemetry__feed span b { color: var(--accent); }

    /* =================================================================
       ABOUT
       ================================================================= */
    .about { display: grid; grid-template-columns: 1.4fr 1fr; gap: 48px; }
    @media (max-width: 920px) { .about { grid-template-columns: 1fr; } }
    .about__bio p { font-size: 18px; line-height: 1.6; color: var(--fg); margin-bottom: 16px; text-wrap: pretty; }
    .about__bio p.is-dim { color: var(--fg-dim); font-size: 16px; }
    .about__stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-content: start; }
    .stat {
      border: 1px solid var(--line); padding: 18px;
      display: flex; flex-direction: column; gap: 8px;
      background: var(--bg-elev);
      position: relative; overflow: hidden;
    }
    .stat::after {
      content: ''; position: absolute; top: 0; right: 0;
      width: 14px; height: 14px;
      border-top: 1px solid var(--accent); border-right: 1px solid var(--accent);
    }
    .stat__value { font-family: var(--sans); font-size: 40px; font-weight: 600; letter-spacing: -0.02em; color: var(--fg); line-height: 1; }
    .stat__label { font-family: var(--mono); font-size: 10px; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.12em; }

    /* =================================================================
       SKILLS MOSAIC
       ================================================================= */
    .skills__grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
      background: var(--line); border: 1px solid var(--line);
    }
    @media (max-width: 920px) { .skills__grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 560px) { .skills__grid { grid-template-columns: 1fr; } }
    .skills__cell {
      background: var(--bg); padding: 24px;
      display: flex; flex-direction: column; gap: 14px;
      min-height: 200px;
      transition: background 180ms ease;
    }
    .skills__cell:hover { background: var(--bg-elev); }
    .skills__cell-head {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--fg-dim);
      padding-bottom: 12px; border-bottom: 1px dashed var(--line-strong);
    }
    .skills__cell-head .ix { color: var(--accent); }
    .skills__list { display: flex; flex-direction: column; gap: 6px; list-style: none; }
    .skills__list li {
      display: flex; justify-content: space-between;
      font-family: var(--mono); font-size: 12px; color: var(--fg);
      padding: 4px 0; border-bottom: 1px dotted var(--line);
    }
    .skills__list li:last-child { border-bottom: none; }
    .skills__list li span { color: var(--fg-faint); font-size: 10px; }

    /* =================================================================
       PROJECTS
       ================================================================= */
    .proj__filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; }
    .proj__filter {
      font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
      padding: 6px 12px;
      border: 1px solid var(--line-strong); color: var(--fg-dim);
      background: transparent; border-radius: 2px;
      cursor: pointer; transition: all 0.15s ease;
    }
    .proj__filter:hover { color: var(--fg); border-color: var(--fg-dim); }
    .proj__filter.is-active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
    .proj__grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    @media (max-width: 920px) { .proj__grid { grid-template-columns: 1fr; } }
    .proj__card {
      border: 1px solid var(--line-strong); background: var(--bg-elev);
      padding: 0;
      display: flex; flex-direction: column;
      position: relative; overflow: hidden;
      transition: border-color 0.18s ease, transform 0.18s ease;
      opacity: 0; transform: translateY(8px);
    }
    .proj__card.is-visible { opacity: 1; transform: none; transition: opacity 600ms ease, transform 600ms ease, border-color 0.18s ease; }
    .proj__card:hover { border-color: var(--accent); }
    .proj__card-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px; border-bottom: 1px solid var(--line);
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--fg-dim);
    }
    .proj__id { color: var(--accent); }
    .proj__status { display: flex; align-items: center; gap: 6px; }
    .proj__status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--ok); }
    .proj__status.is-ongoing::before { background: var(--warn); }
    .proj__status.is-completed { color: var(--ok); }
    .proj__status.is-ongoing { color: var(--warn); }
    .proj__image {
      height: 160px; background: #0d0d0d; border-bottom: 1px solid var(--line);
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .proj__image-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 20px 20px;
    }
    .proj__image-tag {
      position: absolute; bottom: 8px; left: 12px;
      font-family: var(--mono); font-size: 9px; color: var(--fg-faint);
      text-transform: uppercase; letter-spacing: 0.14em;
    }
    .proj__image-art {
      position: relative; z-index: 1; opacity: 0.75;
      transition: opacity 240ms ease;
    }
    .proj__card:hover .proj__image-art { opacity: 1; }
    .proj__body { padding: 18px; display: flex; flex-direction: column; gap: 14px; flex: 1; }
    .proj__title { font-size: 20px; font-weight: 500; letter-spacing: -0.01em; text-wrap: balance; }
    .proj__desc { font-size: 13.5px; color: var(--fg-dim); line-height: 1.55; text-wrap: pretty; }
    .proj__chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: auto; }
    .chip {
      font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 3px 7px; background: #0d0d0d; border: 1px solid var(--line-strong); color: var(--fg-dim);
    }
    .proj__role {
      font-family: var(--mono); font-size: 10px; color: var(--accent);
      letter-spacing: 0.12em; text-transform: uppercase;
    }

    /* =================================================================
       EXPERIENCE TIMELINE
       ================================================================= */
    .xp__list { display: flex; flex-direction: column; gap: 0; border-left: 1px solid var(--line-strong); margin-left: 12px; }
    .xp__entry { position: relative; padding: 24px 0 24px 36px; border-bottom: 1px dashed var(--line); }
    .xp__entry:last-child { border-bottom: none; }
    .xp__entry::before {
      content: ''; position: absolute; left: -6px; top: 32px;
      width: 11px; height: 11px;
      background: var(--bg); border: 2px solid var(--accent); border-radius: 50%;
    }
    .xp__entry.is-current::before {
      background: var(--accent); box-shadow: 0 0 0 4px rgba(16,185,129,0.15);
      animation: pulse 2.4s ease-in-out infinite;
    }
    .xp__row { display: grid; grid-template-columns: 200px 1fr; gap: 24px; align-items: start; }
    @media (max-width: 720px) { .xp__row { grid-template-columns: 1fr; gap: 8px; } }
    .xp__when {
      font-family: var(--mono); font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--fg-dim); padding-top: 6px;
    }
    .xp__when b { display: block; color: var(--accent); font-size: 11px; margin-bottom: 4px; }
    .xp__body { display: flex; flex-direction: column; gap: 8px; }
    .xp__role { font-size: 20px; font-weight: 500; letter-spacing: -0.01em; }
    .xp__where { font-family: var(--mono); font-size: 11px; color: var(--fg-dim); letter-spacing: 0.08em; }
    .xp__where b { color: var(--fg); }
    .xp__notes { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-top: 6px; font-size: 14px; color: var(--fg-dim); line-height: 1.55; }
    .xp__notes li { padding-left: 16px; position: relative; }
    .xp__notes li::before { content: '›'; position: absolute; left: 0; color: var(--accent); font-family: var(--mono); }

    /* =================================================================
       CONTACT
       ================================================================= */
    .contact { padding: 100px 0; }
    .contact__grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: end; }
    @media (max-width: 720px) { .contact__grid { grid-template-columns: 1fr; } }
    .contact__lead { font-size: clamp(36px, 5vw, 72px); line-height: 1; font-weight: 600; letter-spacing: -0.03em; text-wrap: balance; }
    .contact__lead em { font-style: normal; color: var(--accent); }
    .contact__sub { margin-top: 18px; color: var(--fg-dim); font-size: 15px; max-width: 460px; line-height: 1.55; }
    .contact__cta { display: flex; flex-direction: column; gap: 12px; }
    .contact__row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px;
      border: 1px solid var(--line-strong); background: var(--bg-elev);
      font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em;
      transition: all 0.18s ease;
    }
    .contact__row:hover { border-color: var(--accent); color: var(--accent); }
    .contact__row .lab { color: var(--fg-faint); font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; }
    .contact__row .arr { color: var(--fg-faint); transition: transform 0.18s ease, color 0.18s ease; }
    .contact__row:hover .arr { color: var(--accent); transform: translateX(3px); }

    /* =================================================================
       FOOTER
       ================================================================= */
    .footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 24px 0 32px;
      font-family: var(--mono); font-size: 10px; color: var(--fg-faint);
      text-transform: uppercase; letter-spacing: 0.14em;
      flex-wrap: wrap; gap: 12px;
    }
    .footer__cursor { color: var(--accent); animation: blink 1s steps(2) infinite; }

    /* =================================================================
       SCROLLBAR & SELECTION
       ================================================================= */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--line-strong); border: 2px solid var(--bg); }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }
    ::selection { background: var(--accent); color: #0a0a0a; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react">
// ============================================================
// Guilherme Bertanha — Portfolio (v2)
// Single-file React app · Pedro-inspired design system
// ============================================================
const { useState, useEffect, useRef, useMemo } = React;

// ============================================================
// CONTENT
// ============================================================
const CONTENT = {
  meta: {
    name: 'Guilherme Bertanha',
    handle: 'GB',
    location: 'Uberlândia, MG · BR',
    email: 'guilhermebertanha0@gmail.com',
    links: {
      github: 'https://github.com/guibertanha',
      linkedin: 'https://linkedin.com/in/guilhermebertanhaconstante',
    },
  },

  hero: {
    greet: 'SISTEMA ONLINE · PORTFOLIO 2026',
    role: (
      <>

function Topbar({ active }) {
  const [time, setTime] = useState('');
  useEffect(() => {
    const tick = () => {
      const d = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      setTime(`${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())} BRT`);
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);

  const links = [
    ['about',      '01_sobre'],
    ['skills',     '02_stack'],
    ['projects',   '03_projetos'],
    ['experience', '04_trajetoria'],
    ['contact',    '05_contato'],
  ];

  return (
    <div className="topbar">
      <div className="topbar__left">
        <div className="topbar__sig">
          <span className="topbar__dot"></span>
          <span>GB · v26.05</span>
        </div>
        <span className="topbar__time">{time}</span>
      </div>
      <nav className="topbar__nav">
        {links.map(([id, label]) => (
          <a key={id} href={`#${id}`} className={active === id ? 'is-active' : ''}>{label}</a>
        ))}
      </nav>
    </div>
  );
}

// ============================================================
// ESP32 DIAGRAM (animated)
// ============================================================
function ESP32Diagram() {
  const [t, setT] = useState(0);
  useEffect(() => {
    let raf;
    const loop = (now) => { setT(now / 1000); raf = requestAnimationFrame(loop); };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, []);

  const bleAmp = Math.sin(t * 2.1) * 0.5 + 0.5;
  const canAmp = Math.sin(t * 3.4 + 1) * 0.5 + 0.5;
  const gpsAmp = Math.sin(t * 1.2 + 2) * 0.5 + 0.5;
  const lteAmp = Math.sin(t * 1.8 + 0.5) * 0.5 + 0.5;

  return (
    <svg viewBox="0 0 200 220" style={{width:'100%', height:'100%', maxHeight: 280}} preserveAspectRatio="xMidYMid meet">
      {/* Frame corners */}
      <g stroke="var(--fg-faint)" strokeWidth="0.8" fill="none">
        <path d="M10,10 L20,10 M10,10 L10,20"/>
        <path d="M190,10 L180,10 M190,10 L190,20"/>
        <path d="M10,210 L20,210 M10,210 L10,200"/>
        <path d="M190,210 L180,210 M190,210 L190,200"/>
      </g>
      {/* Coord labels */}
      <text x="14" y="216" fontFamily="var(--mono)" fontSize="5" fill="var(--fg-faint)" letterSpacing="0.1em">0,0</text>
      <text x="178" y="216" fontFamily="var(--mono)" fontSize="5" fill="var(--fg-faint)" letterSpacing="0.1em">200,220</text>

      {/* Board body */}
      <rect x="60" y="40" width="80" height="120" fill="#0d0d0d" stroke="var(--line-strong)" strokeWidth="1" rx="1"/>
      <rect x="60" y="40" width="80" height="120" fill="none" stroke="var(--line)" strokeWidth="0.5" strokeDasharray="2 2"/>

      {/* Chip */}
      <rect x="80" y="60" width="40" height="30" fill="var(--bg-elev)" stroke="var(--accent)" strokeWidth="0.8"/>
      <rect x="83" y="63" width="34" height="24" fill="none" stroke="var(--line)" strokeWidth="0.4"/>
      <text x="100" y="79" textAnchor="middle" fontFamily="var(--mono)" fontSize="6" fill="var(--accent)" letterSpacing="0.1em">ESP32</text>

      {/* Pins left */}
      {[0,1,2,3,4,5,6].map(i => (
        <g key={`pl${i}`}>
          <line x1="45" y1={55 + i*14} x2="60" y2={55 + i*14} stroke="var(--line-strong)" strokeWidth="1"/>
          <circle cx="45" cy={55 + i*14} r="1.5" fill="var(--fg-faint)"/>
        </g>
      ))}
      {/* Pins right */}
      {[0,1,2,3,4,5,6].map(i => (
        <g key={`pr${i}`}>
          <line x1="140" y1={55 + i*14} x2="155" y2={55 + i*14} stroke="var(--line-strong)" strokeWidth="1"/>
          <circle cx="155" cy={55 + i*14} r="1.5" fill="var(--fg-faint)"/>
        </g>
      ))}

      {/* BLE waves left */}
      <g opacity={0.3 + bleAmp * 0.7} stroke="var(--info)" fill="none" strokeWidth="0.8">
        <path d="M28,90 Q22,85 22,80 Q22,75 28,70"/>
        <path d="M22,95 Q14,85 14,80 Q14,75 22,65"/>
      </g>
      <text x="17" y="105" fontFamily="var(--mono)" fontSize="6" fill="var(--info)" opacity="0.7" letterSpacing="0.08em">BLE</text>

      {/* CAN dashed lines right */}
      <g opacity={0.3 + canAmp * 0.7}>
        <line x1="155" y1="75" x2="180" y2="75" stroke="var(--warn)" strokeWidth="0.8" strokeDasharray="2 1"/>
        <line x1="155" y1="85" x2="180" y2="85" stroke="var(--warn)" strokeWidth="0.8" strokeDasharray="2 1"/>
        <text x="166" y="100" fontFamily="var(--mono)" fontSize="6" fill="var(--warn)" opacity="0.85" letterSpacing="0.08em">CAN</text>
      </g>

      {/* GPS pulse */}
      <circle cx="100" cy="135" r={2 + gpsAmp * 3} fill="none" stroke="var(--ok)" strokeWidth="0.6" opacity={0.4 + gpsAmp*0.4}/>
      <circle cx="100" cy="135" r="2" fill="var(--ok)" opacity="0.95"/>
      <text x="100" y="152" textAnchor="middle" fontFamily="var(--mono)" fontSize="6" fill="var(--ok)" letterSpacing="0.1em">GPS·FIX</text>

      {/* LTE antenna top */}
      <line x1="95" y1="40" x2="95" y2="25" stroke="var(--fg-dim)" strokeWidth="1"/>
      <line x1="105" y1="40" x2="105" y2="25" stroke="var(--fg-dim)" strokeWidth="1"/>
      <circle cx="95" cy="25" r={1 + lteAmp} fill="var(--accent)" opacity={0.4 + lteAmp*0.5}/>
      <circle cx="105" cy="25" r={1 + (1-lteAmp)} fill="var(--accent)" opacity={0.4 + (1-lteAmp)*0.5}/>
      <text x="100" y="20" textAnchor="middle" fontFamily="var(--mono)" fontSize="6" fill="var(--fg-faint)" letterSpacing="0.1em">LTE</text>

      {/* Board label */}
      <text x="100" y="178" textAnchor="middle" fontFamily="var(--mono)" fontSize="6" fill="var(--fg-faint)" letterSpacing="0.1em">FRITG01LTE · v3.15</text>
    </svg>
  );
}

// ============================================================
// TELEMETRY PANEL
// ============================================================
function Telemetry() {
  const [vals, setVals] = useState({ rssi: -67, ble: 3, can: 28 });
  useEffect(() => {
    const id = setInterval(() => {
      setVals(v => ({
        rssi: Math.max(-85, Math.min(-50, v.rssi + (Math.random()-0.5)*3)),
        ble:  Math.max(1, Math.min(6, v.ble + (Math.random() > 0.75 ? (Math.random() > 0.5 ? 1 : -1) : 0))),
        can:  Math.max(20, Math.min(40, v.can + (Math.random()-0.5)*2)),
      }));
    }, 1400);
    return () => clearInterval(id);
  }, []);

  const feedItems = [
    '[BLE] mesh_sync · 3 nós conectados',
    '[CAN] frame_recv=28B · motor=LIGADO',
    '[GPRS] signal=-67dBm · tower=OK',
    '[OTA] fw_version=3.15.0 · up-to-date',
    '[IMU] accel=0.12g · vibr=FFT_OK',
    '[HMAC] auth_token=VALID · session=5m',
    '[GPS] lat=-18.91 lon=-48.27 · fix=3D',
    '[FreeRTOS] heap=68% · tasks=12 · OK',
  ];

  return (
    <div className="telemetry">
      <div className="telemetry__head">
        <span>UNIT_GB-01 · FROTALL GATEWAY</span>
        <span className="live">LIVE</span>
      </div>
      <div className="telemetry__viz">
        <div className="telemetry__diagram"><ESP32Diagram /></div>
        <div className="telemetry__readout">
          <div className={`telemetry__readout-row ${vals.rssi > -70 ? 'is-ok' : 'is-warn'}`}>
            <span>RSSI</span><b>{vals.rssi.toFixed(0)} dBm</b>
          </div>
          <div className="telemetry__readout-row is-ok">
            <span>BLE_NODES</span><b>{vals.ble}</b>
          </div>
          <div className="telemetry__readout-row">
            <span>CAN_FRAME</span><b>{vals.can.toFixed(0)}B</b>
          </div>
          <div className="telemetry__readout-row is-ok">
            <span>FW_VER</span><b>3.15.0</b>
          </div>
          <div className="telemetry__readout-row">
            <span>PROTO</span><b>BLE · ESP-NOW</b>
          </div>
          <div className="telemetry__readout-row">
            <span>CRYPTO</span><b>AES-256</b>
          </div>
          <div className="telemetry__readout-row is-ok">
            <span>STATUS</span><b>FIELD_OK</b>
          </div>
          <div className="telemetry__readout-row">
            <span>MCU</span><b>ESP32 · LTE</b>
          </div>
        </div>
      </div>
      <div className="telemetry__feed">
        <div className="telemetry__feed-track">
          {[...feedItems, ...feedItems].map((s, i) => (
            <span key={i}><b>›</b> {s}</span>
          ))}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// PROJECTS
// ============================================================
function Projects() {
  const p = CONTENT.projects;
  const [filter, setFilter] = useState('Todos');
  const visibleRef = useRef(new Set());
  const cardsRef = useRef({});

  const filtered = useMemo(() => {
    return filter === 'Todos' ? p.items : p.items.filter(it => it.cat === filter);
  }, [filter]);

  // IntersectionObserver for reveal
  useEffect(() => {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('is-visible');
          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });
    Object.values(cardsRef.current).forEach(el => { if (el) obs.observe(el); });
    return () => obs.disconnect();
  }, [filter]);

  return (
    <section id="projects" data-screen-label="04 Projects">
      <SectionHead title={p.title} id={p.id} />
      <div className="proj__filters">
        {p.filters.map(f => (
          <button
            key={f}
            className={`proj__filter ${filter === f ? 'is-active' : ''}`}
            onClick={() => setFilter(f)}
          >
            {f}
          </button>
        ))}
      </div>
      <div className="proj__grid">
        {filtered.map((it, i) => {
          const Wrapper = it.link ? 'a' : 'div';
          const wrapperProps = it.link ? { href: it.link, target: '_blank', rel: 'noopener' } : {};
          return (
            <Wrapper
              key={it.id}
              className="proj__card"
              ref={el => { cardsRef.current[it.id] = el; }}
              {...wrapperProps}
            >
              <div className="proj__card-head">
                <span className="proj__id">{it.id}</span>
                <span className={`proj__status is-${it.status}`}>
                  {it.status === 'ongoing' ? 'ATIVO' : 'ENTREGUE'}
                </span>
              </div>
              <div className="proj__image">
                <div className="proj__image-grid"></div>
                <ProjectArt kind={it.art} />
                <span className="proj__image-tag">{it.tag}</span>
              </div>
              <div className="proj__body">
                <div className="proj__role">{it.role}</div>
                <h3 className="proj__title">{it.title}</h3>
                <p className="proj__desc">{it.desc}</p>
                <div className="proj__chips">
                  {it.chips.map(c => <span key={c} className="chip">{c}</span>)}
                </div>
              </div>
            </Wrapper>
          );
        })}
      </div>
    </section>
  );
}

// ============================================================
// SCROLLSPY
// ============================================================
function useScrollSpy(ids) {
  const [active, setActive] = useState(ids[0]);
  useEffect(() => {
    const handler = () => {
      const y = window.scrollY + 140;
      let cur = ids[0];
      for (const id of ids) {
        const el = document.getElementById(id);
        if (el && el.offsetTop <= y) cur = id;
      }
      setActive(cur);
    };
    handler();
    window.addEventListener('scroll', handler, { passive: true });
    return () => window.removeEventListener('scroll', handler);
  }, [ids.join(',')]);
  return active;
}
