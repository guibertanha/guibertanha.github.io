<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FRITG-CONSOLE · Guilherme Bertanha</title>
  <meta name="description" content="Firmware R&D Engineer — ESP32, FreeRTOS, ROS2, BLE mesh, CAN FD. EDROM · Terasite Tecnologia · UFU." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* =========================================================
       FRITG-CONSOLE · TOKENS
       ========================================================= */
    :root {
      --bg: #050a0e;
      --bg-elev: #091420;
      --bg-card: #0d1d2e;
      --bg-hover: #112336;

      --line: #0f2a40;
      --line-strong: #1a3f5c;
      --line-accent: #0d4f6e;

      --fg: #c8d8e8;
      --fg-dim: #5a7a90;
      --fg-faint: #2a4a60;

      --accent: #f0b429;
      --accent-bright: #f8c94a;
      --accent-dim: #b8861c;
      --accent-glow: rgba(240, 180, 41, 0.15);

      --ok: #4ade80;
      --warn: #fb923c;
      --err: #f87171;
      --info: #38bdf8;

      --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      --sans: 'Inter', system-ui, sans-serif;
    }

    /* =========================================================
       RESET / BASE
       ========================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* Phosphor screen scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.06) 3px,
        rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }
    /* Subtle vignette + amber top glow */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(240,180,41,0.05), transparent 60%),
        radial-gradient(ellipse 90% 60% at 50% 110%, rgba(0,0,0,0.55), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
    ::selection { background: var(--accent); color: #050a0e; }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--line-strong); }
    ::-webkit-scrollbar-thumb:hover { background: var(--line-accent); }

    .page {
      max-width: 920px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }
    @media (max-width: 640px) { .page { padding: 0 16px; } }

    section {
      padding: 72px 0;
      border-bottom: 1px solid var(--line);
      scroll-margin-top: 90px;
    }
    section:last-of-type { border-bottom: none; }

    /* =========================================================
       TOPBAR
       ========================================================= */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(5, 10, 14, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line-strong);
      padding: 0 24px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.05em;
    }
    .topbar__prompt {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 0 6px;
      color: var(--fg-dim);
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }
    .topbar__prompt-tag { color: var(--accent); font-weight: 600; }
    .topbar__prompt-path { color: var(--info); }
    .topbar__time { margin-left: auto; color: var(--fg-faint); }
    .topbar__nav {
      display: flex;
      padding: 4px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .topbar__nav::-webkit-scrollbar { display: none; }
    .topbar__nav a {
      padding: 5px 14px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--fg-dim);
      border-right: 1px solid var(--line);
      transition: color 150ms, background 150ms;
      white-space: nowrap;
    }
    .topbar__nav a:first-child { border-left: 1px solid var(--line); }
    .topbar__nav a:hover { color: var(--fg); background: rgba(240,180,41,0.04); }
    .topbar__nav a.is-active { color: var(--accent); background: var(--accent-glow); }

    @media (max-width: 640px) {
      .topbar { padding: 0 16px; }
      .topbar__prompt-path { display: none; }
    }

    /* =========================================================
       BUTTONS
       ========================================================= */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px;
      border: 1px solid var(--line-strong);
      font-family: var(--mono); font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--fg); background: transparent;
      transition: all 0.15s ease;
      cursor: pointer;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
    .btn--primary {
      background: var(--accent); border-color: var(--accent); color: #050a0e; font-weight: 600;
    }
    .btn--primary:hover { background: var(--accent-bright); border-color: var(--accent-bright); color: #050a0e; }
    .btn .arr { transition: transform 0.15s ease; }
    .btn:hover .arr { transform: translateX(3px); }

    /* =========================================================
       HERO / BOOT
       ========================================================= */
    .boot {
      min-height: 90svh;
      display: flex; flex-direction: column;
      justify-content: center;
      padding: 56px 0 40px;
      position: relative;
    }
    .boot__console {
      background: var(--bg-elev);
      border: 1px solid var(--line-strong);
      padding: 36px 24px 20px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.7;
      margin-bottom: 48px;
      position: relative;
      min-height: 320px;
    }
    .boot__console::before {
      content: 'SERIAL MONITOR — 115200 BAUD — FRITG01LTE';
      position: absolute; top: 0; left: 0; right: 0;
      padding: 7px 16px;
      background: var(--line-strong);
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--fg-dim);
      border-bottom: 1px solid var(--line-strong);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .boot__console::after {
      content: '● ● ●';
      position: absolute; top: 4px; right: 12px;
      color: var(--fg-faint);
      font-size: 9px;
      letter-spacing: 4px;
    }
    .boot__line {
      display: block;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .boot__line.ok { color: var(--ok); }
    .boot__line.warn { color: var(--warn); }
    .boot__line.accent { color: var(--accent); }
    .boot__line.dim { color: var(--fg-dim); }
    .boot__line.info { color: var(--info); }
    .boot__cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--accent);
      animation: blink-block 0.8s steps(2) infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink-block { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .boot__hero {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .boot__hero.is-visible { opacity: 1; transform: none; }

    .boot__name {
      font-family: var(--mono);
      font-size: clamp(40px, 7vw, 76px);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1;
      color: var(--fg);
      margin-bottom: 20px;
    }
    .boot__name em { font-style: normal; color: var(--accent); }
    .boot__cursor-inline {
      display: inline-block;
      width: 0.5em; height: 0.8em;
      background: var(--accent);
      vertical-align: -0.05em;
      margin-left: 4px;
      animation: blink-block 0.8s steps(2) infinite;
    }

    .boot__role {
      font-size: 14.5px;
      color: var(--fg-dim);
      max-width: 600px;
      margin-bottom: 28px;
      font-family: var(--sans);
      line-height: 1.65;
    }
    .boot__role strong { color: var(--fg); font-weight: 500; }

    .boot__meta {
      display: inline-flex;
      border: 1px solid var(--line-strong);
      background: var(--bg-elev);
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .boot__meta-cell {
      padding: 10px 20px;
      border-right: 1px solid var(--line-strong);
      display: flex; flex-direction: column; gap: 4px;
    }
    .boot__meta-cell:last-child { border-right: none; }
    .boot__meta-label {
      font-size: 9px; color: var(--fg-faint);
      text-transform: uppercase; letter-spacing: 0.18em;
    }
    .boot__meta-value { font-size: 12px; color: var(--fg); }

    .boot__cta { display: flex; gap: 12px; flex-wrap: wrap; }

    /* =========================================================
       SECTION HEAD (terminal cmd style)
       ========================================================= */
    .sec-head {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line-strong);
      font-family: var(--mono);
      flex-wrap: wrap;
    }
    .sec-head__caret { color: var(--accent); font-weight: 700; font-size: 14px; }
    .sec-head__cmd {
      color: var(--info); font-size: 12px; letter-spacing: 0.04em;
    }
    .sec-head__rule { flex: 1; height: 1px; background: var(--line); min-width: 30px; }
    .sec-head__label {
      font-size: 22px; font-weight: 700; color: var(--fg);
      letter-spacing: -0.015em; font-family: var(--mono);
    }
    @media (max-width: 480px) {
      .sec-head__rule { display: none; }
    }

    /* =========================================================
       ABOUT — PROFILE DUMP
       ========================================================= */
    .profile-dump {
      background: var(--bg-elev);
      border: 1px solid var(--line-strong);
      font-family: var(--mono);
      font-size: 13px;
      margin-bottom: 32px;
    }
    .profile-dump__header {
      padding: 8px 20px;
      background: var(--line-strong);
      color: var(--fg-dim);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--line-strong);
      display: flex; align-items: center; gap: 8px;
    }
    .profile-dump__header::before {
      content: '$';
      color: var(--accent);
      font-weight: 700;
    }
    .profile-dump__body { padding: 16px 20px; }
    .profile-dump__row {
      display: grid; grid-template-columns: 140px 1fr;
      padding: 6px 0;
      border-bottom: 1px dotted var(--line);
      line-height: 1.5;
      gap: 8px;
    }
    .profile-dump__row:last-child { border-bottom: none; }
    .profile-dump__key { color: var(--fg-faint); }
    .profile-dump__key::before { content: '· '; opacity: 0.6; }
    .profile-dump__val { color: var(--fg); }
    .profile-dump__val .hl { color: var(--accent); }

    .bio-grid {
      display: grid; grid-template-columns: 1.2fr 1fr; gap: 28px;
    }
    @media (max-width: 720px) { .bio-grid { grid-template-columns: 1fr; } }
    .bio-text p {
      font-family: var(--sans); font-size: 15px; color: var(--fg-dim);
      line-height: 1.7; margin-bottom: 14px; text-wrap: pretty;
    }
    .bio-text p:first-child { color: var(--fg); }
    .bio-text p strong { color: var(--fg); font-weight: 500; }

    .counters {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
      background: var(--line-strong); border: 1px solid var(--line-strong);
      align-content: start;
    }
    .counter {
      background: var(--bg-card); padding: 18px;
      display: flex; flex-direction: column; gap: 6px;
      position: relative;
    }
    .counter::after {
      content: ''; position: absolute; top: 0; right: 0;
      width: 10px; height: 10px;
      border-top: 1px solid var(--accent);
      border-right: 1px solid var(--accent);
    }
    .counter__val {
      font-family: var(--mono); font-size: 32px; font-weight: 700;
      color: var(--accent); letter-spacing: -0.025em; line-height: 1;
    }
    .counter__label {
      font-size: 9.5px; color: var(--fg-dim);
      text-transform: uppercase; letter-spacing: 0.14em;
    }

    /* =========================================================
       STACK — SIGNAL BARS
       ========================================================= */
    .stack-section { display: flex; flex-direction: column; gap: 16px; }
    .stack-reg {
      border: 1px solid var(--line-strong);
      background: var(--bg-elev);
      overflow: hidden;
    }
    .stack-reg__head {
      padding: 9px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--line-strong);
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.16em;
      color: var(--fg-dim);
      display: flex; align-items: center; gap: 10px;
    }
    .stack-reg__head .reg-id { color: var(--accent); font-weight: 700; }
    .stack-reg__head .reg-count {
      margin-left: auto; color: var(--fg-faint); font-size: 9.5px;
    }
    .stack-reg__items { padding: 0; }
    .stack-item {
      display: grid; grid-template-columns: 200px 1fr 80px;
      align-items: center; gap: 16px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      transition: background 150ms;
    }
    .stack-item:last-child { border-bottom: none; }
    .stack-item:hover { background: var(--bg-hover); }
    .stack-item__name { font-size: 12px; color: var(--fg); font-weight: 500; }
    .stack-item__bar {
      height: 6px; background: var(--line-strong);
      position: relative; overflow: hidden;
    }
    .stack-item__bar::before {
      content: ''; position: absolute; inset: 0;
      background-image: repeating-linear-gradient(90deg,
        transparent 0, transparent 3px,
        rgba(0,0,0,0.25) 3px, rgba(0,0,0,0.25) 4px);
      z-index: 2;
      pointer-events: none;
    }
    .stack-item__fill {
      position: absolute; inset: 0; width: var(--pct);
      background: linear-gradient(to right, var(--accent-dim), var(--accent));
      transform-origin: left;
      animation: bar-in 0.9s cubic-bezier(0.22,1,0.36,1) forwards;
      transform: scaleX(0);
      box-shadow: 0 0 6px rgba(240,180,41,0.4);
    }
    @keyframes bar-in { to { transform: scaleX(1); } }
    .stack-item__tag {
      font-size: 9.5px; color: var(--fg-faint);
      text-align: right; letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    @media (max-width: 640px) {
      .stack-item { grid-template-columns: 130px 1fr 60px; gap: 10px; padding: 10px 12px; }
    }

    /* =========================================================
       MISSIONS — LS / GIT LOG STYLE
       ========================================================= */
    .mission-filters {
      display: inline-flex;
      border: 1px solid var(--line-strong);
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .mission-filter {
      padding: 6px 14px;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--fg-dim);
      border-right: 1px solid var(--line-strong);
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
    }
    .mission-filter:last-child { border-right: none; }
    .mission-filter.is-active { background: var(--accent); color: #050a0e; font-weight: 700; }
    .mission-filter:hover:not(.is-active) { background: var(--bg-hover); color: var(--fg); }

    .missions__hint {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--fg-faint);
      margin-bottom: 10px;
      letter-spacing: 0.04em;
    }
    .missions__hint b { color: var(--fg-dim); }

    .missions {
      display: flex; flex-direction: column;
      border: 1px solid var(--line-strong);
      background: var(--bg-elev);
    }
    .mission {
      display: grid;
      grid-template-columns: auto auto 1fr auto auto;
      align-items: center;
      gap: 0;
      border-bottom: 1px solid var(--line);
      transition: background 150ms;
    }
    .mission:last-child { border-bottom: none; }
    .mission:hover { background: var(--bg-hover); }
    .mission.is-open { background: var(--bg-card); }
    .mission__perms {
      padding: 12px 14px;
      font-family: var(--mono); font-size: 10.5px;
      color: var(--fg-faint);
      letter-spacing: 0.04em;
      border-right: 1px solid var(--line);
      white-space: nowrap;
    }
    .mission__id {
      padding: 12px 14px;
      font-family: var(--mono); font-size: 11px;
      color: var(--accent); font-weight: 700; letter-spacing: 0.06em;
      border-right: 1px solid var(--line);
      white-space: nowrap;
    }
    .mission__main {
      padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
      min-width: 0;
    }
    .mission__title {
      font-size: 13px; color: var(--fg); font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mission__status {
      padding: 12px 14px;
      font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.14em;
      border-right: 1px solid var(--line);
      white-space: nowrap;
      font-weight: 600;
    }
    .mission__status.ok { color: var(--ok); }
    .mission__status.warn { color: var(--warn); }
    .mission__caret {
      padding: 12px 14px;
      color: var(--fg-faint); font-size: 11px;
      transition: transform 200ms ease;
      cursor: pointer;
    }
    .mission.is-open .mission__caret { transform: rotate(90deg); color: var(--accent); }

    /* Trigger as full-row click */
    .mission__trigger {
      display: contents;
      cursor: pointer;
    }

    .mission__expand {
      grid-column: 1 / -1;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.22,1,0.36,1);
      border-top: 1px solid transparent;
    }
    .mission.is-open .mission__expand {
      max-height: 420px;
      border-top: 1px solid var(--line);
    }
    .mission__detail {
      padding: 18px 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: start;
    }
    @media (max-width: 720px) { .mission__detail { grid-template-columns: 1fr; } }
    .mission__detail-text {
      background: var(--bg);
      border-left: 2px solid var(--accent);
      padding: 14px 16px;
      font-family: var(--sans);
      font-size: 13.5px;
      color: var(--fg-dim);
      line-height: 1.65;
    }
    .mission__detail-role {
      font-family: var(--mono); font-size: 10px; color: var(--accent);
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 8px; display: block;
    }
    .mission__chips {
      display: flex; flex-wrap: wrap; gap: 4px;
      margin-top: 10px;
    }
    .chip {
      font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.08em;
      padding: 2px 7px;
      background: var(--bg);
      border: 1px solid var(--line-strong);
      color: var(--fg-dim);
      font-family: var(--mono);
    }
    .mission__link {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 12px;
      font-family: var(--mono); font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--info);
      padding: 6px 10px;
      border: 1px solid var(--info);
      transition: all 0.15s ease;
    }
    .mission__link:hover { background: var(--info); color: #050a0e; }
    .mission__detail-side {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fg-faint);
      letter-spacing: 0.08em;
      min-width: 160px;
    }
    .mission__detail-side dt {
      text-transform: uppercase;
      color: var(--fg-faint);
      margin-bottom: 2px;
    }
    .mission__detail-side dd {
      color: var(--fg-dim);
      margin-bottom: 8px;
    }

    @media (max-width: 640px) {
      .mission { grid-template-columns: auto 1fr auto; }
      .mission__perms { display: none; }
      .mission__status { padding: 12px 10px; }
    }

    /* =========================================================
       EXPERIENCE — GIT LOG
       ========================================================= */
    .gitlog__head {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg-dim);
      padding: 8px 14px;
      background: var(--bg-elev);
      border: 1px solid var(--line-strong);
      border-bottom: none;
      letter-spacing: 0.04em;
    }
    .gitlog__head b { color: var(--accent); }
    .gitlog {
      font-family: var(--mono);
      border: 1px solid var(--line-strong);
      background: var(--bg-elev);
      padding: 4px 0;
    }
    .gitlog__entry {
      display: flex;
      align-items: stretch;
      padding: 0;
    }
    .gitlog__gutter {
      display: flex; flex-direction: column;
      align-items: center;
      width: 56px;
      flex-shrink: 0;
      padding: 0 16px;
    }
    .gitlog__dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: var(--bg);
      margin-top: 20px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .gitlog__dot.is-current {
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
      animation: pulse-amber 2.4s ease-in-out infinite;
    }
    @keyframes pulse-amber {
      0%, 100% { box-shadow: 0 0 0 4px rgba(240,180,41,0.15); }

  { text: '> system_ready · type "help" for command list_', cls: '' },
];

function BootSequence({ onComplete }) {
  const [count, setCount] = useState(0);
  const done = count >= BOOT_LINES.length;
  const completedRef = useRef(false);

  useEffect(() => {
    if (count >= BOOT_LINES.length) {
      if (!completedRef.current) {
        completedRef.current = true;
        onComplete && onComplete();
      }
      return;
    }
    const prevText = count > 0 ? BOOT_LINES[count - 1].text : '';
    const initial = count === 0 ? 250 : 0;
    const delay = initial || (prevText === '' ? 50 : (prevText.startsWith('  ✓') ? 95 : Math.random() * 40 + 25));
    const id = setTimeout(() => setCount(c => c + 1), delay);
    return () => clearTimeout(id);
  }, [count]);

  const lines = BOOT_LINES.slice(0, count);

  return (
    <div className="boot__console">
      {lines.map((line, i) => (
        <span key={i} className={`boot__line ${line?.cls || ''}`}>{line?.text || ' '}</span>
      ))}
      {!done && <span className="boot__cursor"></span>}
    </div>
  );
}

  return (
    <div className="ping-row">
      <span className="ping-row__key">{row.key}</span>

const HELP_TEXT = [
  { cls: 'info', text: 'comandos disponíveis:' },
  { cls: '', text: '  ajuda       → mostra esta mensagem' },
  { cls: '', text: '  sobre       → rola até a seção Sobre' },
  { cls: '', text: '  sei         → rola até "O que sei fazer"' },
  { cls: '', text: '  projetos    → rola até Projetos' },
  { cls: '', text: '  trajetoria  → rola até Trajetória' },
  { cls: '', text: '  contato     → rola até Contato' },
  { cls: '', text: '  github      → abre meu GitHub' },
  { cls: '', text: '  linkedin    → abre meu LinkedIn' },
  { cls: '', text: '  email       → abre seu app de e-mail' },
  { cls: '', text: '  quem        → diz quem eu sou' },
  { cls: '', text: '  hora        → mostra a hora aqui' },
  { cls: '', text: '  limpar      → limpa o histórico' },
];

function FloatingTerminal() {
  const [open, setOpen] = useState(false);
  const [history, setHistory] = useState([
    { cls: 'ok', text: '[FRITG-CONSOLE] terminal aberto · pode digitar' },
    { cls: 'info', text: 'digite "ajuda" pra ver os comandos' },
  ]);
  const [input, setInput] = useState('');
  const [cmdHist, setCmdHist] = useState([]);
  const [histIdx, setHistIdx] = useState(-1);
  const inputRef = useRef(null);
  const historyRef = useRef(null);

  useEffect(() => {
    if (open && inputRef.current) {
      setTimeout(() => inputRef.current?.focus(), 50);
    }
  }, [open]);

  useEffect(() => {
    if (historyRef.current) {
      historyRef.current.scrollTop = historyRef.current.scrollHeight;
    }
  }, [history]);

  useEffect(() => {
    const handler = (e) => {
      if (e.key === '`' && !['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) {
        e.preventDefault();
        setOpen(v => !v);
      }
      if (e.key === 'Escape' && open) setOpen(false);
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [open]);

  const append = (lines) => setHistory(h => [...h, ...lines]);

  const runCmd = (raw) => {
    const cmd = raw.trim().toLowerCase();
    if (!cmd) return;
    append([{ cls: 'user', text: `gb ~ $ ${raw}` }]);
    setCmdHist(h => [raw, ...h]);
    setHistIdx(-1);

    const scrollTo = (id, label) => {
      const el = document.getElementById(id);
      if (el) {
        const top = el.getBoundingClientRect().top + window.scrollY - 80;
        window.scrollTo({ top, behavior: 'smooth' });
        append([{cls:'ok', text:`→ levando você até ${label}`}]);
      } else {
        append([{cls:'err', text:`não encontrei: ${id}`}]);
      }
    };

    switch (cmd) {
      case 'ajuda': case 'help': case '?':
        append(HELP_TEXT); break;
      case 'limpar': case 'clear': case 'cls':
        setHistory([]); break;
      case 'quem': case 'whoami':
        append([{cls:'info', text:'Guilherme Bertanha · engenheiro mecatrônico · Uberlândia MG'}]);
        break;
      case 'hora': case 'date':
        append([{cls:'info', text: new Date().toLocaleString('pt-BR', {dateStyle: 'full', timeStyle: 'medium'})}]);
        break;
      case 'sobre': case 'about':
        scrollTo('about', 'Sobre'); break;
      case 'sei': case 'stack': case 'skills':
        scrollTo('stack', 'O que sei fazer'); break;
      case 'projetos': case 'projects':
        scrollTo('projects', 'Projetos'); break;
      case 'trajetoria': case 'trajetória': case 'log': case 'experience':
        scrollTo('experience', 'Trajetória'); break;
      case 'contato': case 'contact':
        scrollTo('contact', 'Contato'); break;
      case 'github': case 'gh':
        window.open(CONTENT.meta.github, '_blank');
        append([{cls:'ok', text:'→ abrindo GitHub em nova aba'}]); break;
      case 'linkedin': case 'li':
        window.open(CONTENT.meta.linkedin, '_blank');
        append([{cls:'ok', text:'→ abrindo LinkedIn em nova aba'}]); break;
      case 'email': case 'mail': case 'e-mail':
        window.location.href = `mailto:${CONTENT.meta.email}`;
        append([{cls:'ok', text:`→ abrindo seu app de e-mail`}]); break;
      case 'sair': case 'fechar': case 'exit': case 'quit':
        append([{cls:'info', text:'fechando...'}]);
        setTimeout(() => setOpen(false), 300); break;
      case 'oi': case 'olá': case 'ola':
        append([{cls:'info', text:'oi! obrigado por explorar 🙂 digite "ajuda" pra ver o que dá pra fazer aqui.'}]);
        break;
      case 'obrigado': case 'obrigada': case 'valeu':
        append([{cls:'info', text:'imagina, fico feliz que tenha gostado.'}]); break;
      default:
        append([{cls:'err', text:`não entendi: "${cmd}" — digite "ajuda" pra ver os comandos`}]);
    }
  };

  const onSubmit = (e) => {
    e.preventDefault();
    runCmd(input);
    setInput('');
  };

  const onKeyDown = (e) => {
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      const next = Math.min(cmdHist.length - 1, histIdx + 1);
      if (next >= 0 && cmdHist[next]) { setInput(cmdHist[next]); setHistIdx(next); }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      const next = histIdx - 1;
      if (next < 0) { setInput(''); setHistIdx(-1); }
      else { setInput(cmdHist[next]); setHistIdx(next); }
    }
  };

  return (
    <>
      <button className="terminal-btn" onClick={() => setOpen(v => !v)} aria-label="Abrir terminal" title="atalhos por digitar ` ou clicar">
        &gt;_
      </button>
      <div className={`terminal-float ${open ? 'is-open' : ''}`}>
        <div className="terminal-float__bar">
          <span>FRITG-CONSOLE · /dev/tty0</span>
          <button className="terminal-float__close" onClick={() => setOpen(false)} aria-label="Fechar">✕</button>
        </div>
        <div className="terminal-float__history" ref={historyRef}>
          {history.map((line, i) => (
            <div key={i} className={`terminal-float__line ${line.cls}`}>{line.text}</div>
          ))}
        </div>
        <form className="terminal-float__input-row" onSubmit={onSubmit}>
          <span className="terminal-float__prompt-sym">&gt;</span>
          <input
            ref={inputRef}
            type="text"
            className="terminal-float__input"
            value={input}
            onChange={(e) => setInput(e.target.value)}
            onKeyDown={onKeyDown}
            placeholder='ex: "ajuda" · "projetos" · "github"'
            autoComplete="off"
            spellCheck="false"
          />
        </form>
      </div>
    </>
  );
}

// SCROLL SPY
// ============================================================
function useScrollSpy(ids) {
  const [active, setActive] = useState(ids[0]);
  useEffect(() => {
    const handler = () => {
      const y = window.scrollY + 160;
      let cur = ids[0];
      for (const id of ids) {
        const el = document.getElementById(id);
        if (el && el.offsetTop <= y) cur = id;
      }
      setActive(cur);
    };
    handler();
    window.addEventListener('scroll', handler, { passive: true });
    return () => window.removeEventListener('scroll', handler);
  }, [ids.join(',')]);
  return active;
}
